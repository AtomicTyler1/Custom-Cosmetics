[config]
schemaVersion = "0.0.1"

[general]
repository = "https://thunderstore.io"

[package]
namespace = "AtomicStudio"
name = "Custom_Cosmetics"
description = "A library for custom cosmetics"
websiteUrl = "https://atomictyler.dev/"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack = "5.4.2403"

[build]
icon = "../../icon.png"
readme = "../../README.md"
outdir = "../../artifacts/thunderstore/"

[[build.copy]]
source = "../../artifacts/bin/Custom_Cosmetics/release/com.atomic.customcosmetics.dll"
target = "plugins/"

[[build.copy]]
source = "../../CHANGELOG.md"
target = "/"

[[build.copy]]
source = "../../LICENSE"
target = "/"

# The following config options only apply when using TCLI to publish to Thunderstore directly:

[publish]
# See communities at:
# https://thunderstore.io/api/experimental/community/
communities = [ "crashout-crew", ]

[publish.categories]
# See categories at:
# https://thunderstore.io/api/experimental/community/crashout-crew/category/
crashout-crew = [ "mods", ]
